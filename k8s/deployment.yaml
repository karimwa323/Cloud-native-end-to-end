apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-website
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: simple-website
  template:
    metadata:
      labels:
        app: simple-website
    spec:
      containers:
      - name: simple-website
        image: 010438480291.dkr.ecr.eu-central-1.amazonaws.com/cloud-native-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: simple-website-service
spec:
  type: LoadBalancer  
  selector:
    app: simple-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80